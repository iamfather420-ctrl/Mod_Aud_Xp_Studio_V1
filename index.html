<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AGATE MOD XP</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:monospace}
body{background:#000;color:#0ff;min-height:100vh;overflow:hidden}
.bg{position:fixed;top:0;left:0;width:100%;height:100%;background:radial-gradient(circle at 50% 50%,#0a0a1a 0%,#000 100%);z-index:0}
.ui{position:relative;z-index:10;height:100vh;display:flex;flex-direction:column;padding:10px}
.bar{display:flex;justify-content:space-between;padding:8px;border:1px solid #0ff;background:rgba(0,255,255,0.1);font-size:10px;margin-bottom:10px}
.cam{flex:1;border:2px solid #b829dd;border-radius:10px;overflow:hidden;position:relative;background:#001;min-height:200px}
video{width:100%;height:100%;object-fit:cover}
.overlay{position:absolute;top:10px;left:10px;color:#f00;font-size:12px}
.rec{display:inline-block;width:10px;height:10px;background:#f00;border-radius:50%;animation:b 1s infinite;margin-right:5px}
@keyframes b{0%,100%{opacity:1}50%{opacity:0}}
.controls{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:10px}
.btn{padding:15px;border:1px solid #0ff;background:rgba(0,255,255,0.1);color:#0ff;text-align:center;font-size:11px}
.btn:active{background:#0ff;color:#000}
.log{height:80px;overflow-y:auto;background:rgba(0,20,0,0.9);border:1px solid #0f0;color:#0f0;padding:5px;font-size:9px;margin-top:10px}
</style>
</head>
<body>
<div class="bg"></div>
<div class="ui">
<div class="bar"><span>◉ ONLINE</span><span id="c">00:00:00</span></div>
<div class="cam">
<video id="v" autoplay playsinline></video>
<div class="overlay"><span class="rec"></span>REC</div>
</div>
<div class="controls">
<div class="btn" onclick="s()">CAPTURE</div>
<div class="btn" onclick="r()">RECORD</div>
<div class="btn" onclick="x()">FX</div>
<div class="btn" onclick="y()">SYNTH</div>
<div class="btn" onclick="z()">RENDER</div>
<div class="btn" onclick="q()">SHARE</div>
</div>
<div class="log" id="l"><div>> SYSTEM READY</div></div>
</div>
<script>
setInterval(()=>{document.getElementById('c').textContent=new Date().toLocaleTimeString()},1000);
function log(m){const l=document.getElementById('l'),d=document.createElement('div');d.textContent='> '+m;l.appendChild(d);l.scrollTop=l.scrollHeight}
async function cam(){try{const s=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});document.getElementById('v').srcObject=s;log('CAM ACTIVE')}catch(e){log('CAM FALLBACK')}}
function s(){log('SNAP SAVED')}
function r(){log('REC TOGGLED')}
function x(){log('FX APPLIED')}
function y(){log('SYNTH PLAYED');try{const a=new(window.AudioContext||window.webkitAudioContext)(),o=a.createOscillator(),g=a.createGain();o.frequency.value=440;o.connect(g);g.connect(a.destination);g.gain.value=0.1;o.start();o.stop(a.currentTime+0.1)}catch(e){}}
function z(){log('RENDERING...')}
function q(){log('SHARING...');if(navigator.share)navigator.share({title:'AGATE'})}
cam();
</script>
</body>
</html>
